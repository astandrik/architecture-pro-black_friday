name: cassandra-test

services:
  cassandra-1:
    image: cassandra:4.1
    container_name: cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: mobilnyi_mir
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe cluster"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - cassandra-net

  cassandra-2:
    image: cassandra:4.1
    container_name: cassandra-2
    environment:
      CASSANDRA_CLUSTER_NAME: mobilnyi_mir
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack2
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe cluster"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    depends_on:
      cassandra-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - cassandra-net

  cassandra-3:
    image: cassandra:4.1
    container_name: cassandra-3
    environment:
      CASSANDRA_CLUSTER_NAME: mobilnyi_mir
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack3
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe cluster"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    depends_on:
      cassandra-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - cassandra-net

networks:
  cassandra-net:
    driver: bridge
